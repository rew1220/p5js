
<html lang="ko">

    <title>p5 프로젝트</title>
    <!-- Tailwind CSS (레이아웃 및 유틸리티용) -->

</head>

            <!-- 2. 우측 상단: exam4 -->
            <div class="project-frame">
                <iframe src="exam4/index.html" title="p5.js Project 4"></iframe>
            </div>

            <!-- 3. 좌측 하단: exam2 -->
            <div class="project-frame">
                <iframe src="exam2/index.html" title="p5.js Project 2"></iframe>
            </div>

            <!-- 4. 우측 하단: exam3 -->
            <div class="project-frame">
                <iframe src="exam3/index.html" title="p5.js Project 3"></iframe>
